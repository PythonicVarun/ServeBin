                    description: OK
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /range/{n}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Returns a range-enabled byte stream.
            description: Streams n bytes and honors Range requests.
            parameters:
                - name: n
                  in: path
                  description: Total number of bytes
                  required: true
                  schema:
                      type: integer
                  example: 1024
                - name: chunk_size
                  in: query
                  description: Chunk size in bytes
                  schema:
                      type: integer
                  example: 256
                - name: duration
                  in: query
                  description: Duration in seconds
                  schema:
                      type: number
                      default: 0
                  example: 0
                - name: Range
                  in: header
                  description: Byte range request header
                  schema:
                      type: string
                  example: bytes=0-99
            responses:
                "200":
                    description: OK
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
                "416":
                    description: Requested Range Not Satisfiable
    /redirect-to:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Redirects to the requested URL.
            description: Redirects to the url query parameter using the optional status_code.
            parameters:
                - name: url
                  in: query
                  description: Target URL
                  required: true
                  schema:
                      type: string
                  example: https://servebin.dev/get
                - name: status_code
                  in: query
                  description: Redirect status code
                  schema:
                      type: integer
                      default: 302
                  example: 302
            responses:
                "302":
                    description: Found
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
