            responses:
                "200":
                    description: OK
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /hidden-basic-auth/{user}/{passwd}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: 404'd basic auth.
            description:
                Returns authenticated user data when the credentials match, otherwise
                404s.
            parameters:
                - name: user
                  in: path
                  description: Username
                  required: true
                  schema:
                      type: string
                  example: user
                - name: passwd
                  in: path
                  description: Password
                  required: true
                  schema:
                      type: string
                  example: passwd
            responses:
