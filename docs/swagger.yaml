openapi: 3.0.3
info:
    title: ServeBin
    description:
        Welcome to ServeBin documentation! ServeBin is a cutting-edge HTTP
        testing and debugging tool, built with the latest technologies in Go. This documentation
        provides comprehensive details about the endpoints, parameters, and responses
        offered by ServeBin, empowering developers to streamline their testing workflows
        and ensure the reliability of their applications. Explore the various features
        and capabilities of ServeBin to optimize your development process and elevate
        your HTTP testing experience.
    termsOfService: https://servebin.dev/
    contact:
        email: contact@mrayush.me
    license:
        name: BSD 3-Clause
        url: https://github.com/AyushAgnihotri2025/ServeBin/blob/master/LICENSE
    version: v1.3.0
servers:
    - url: https://servebin.dev/
    - url: https://s1.servebin.dev/
    - url: https://s2.servebin.dev/
tags:
    - name: Status Codes
      description: Generates responses with given status code
    - name: Request inspection
      description: Inspect the request data
    - name: Response formats
      description: Returns responses in different data formats
    - name: Images
      description: Returns different image formats
    - name: HTTP Methods
      description: Testing different HTTP verbs
    - name: HTTPBin Compatibility
      description: HTTPBin-compatible utility endpoints
paths:
    /brotli:
        get:
            tags:
                - Response formats
            summary: Returns Brotli-encoded data.
            description: Returns Brotli-encoded data.
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.BrotliResponse"
                "404":
                    description: Not Found
                "406":
                    description: Not Acceptable
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /deflate:
        get:
            tags:
                - Response formats
            summary: Returns Deflate-encoded data.
            description: Returns Deflate-encoded data.
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.DeflateResponse"
                "404":
                    description: Not Found
                "406":
                    description: Not Acceptable
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /deny:
        get:
            tags:
                - Response formats
            summary: Returns page denied by robots.txt rules.
            description: Returns page denied by robots.txt rules.
            responses:
                "200":
                    description: OK
                "404":
                    description: Not Found
                "406":
                    description: Not Acceptable
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /get:
        get:
            tags:
                - HTTP Methods
            summary: Returns the request parameters.
            description:
                Returns different type of request parameters like form data, json
                data, raw data, headers etc.
            parameters:
                - name: customheader
                  in: header
                  description: Header
                  schema:
                      type: string
                  example: servebin-demo
                - name: queryparam
                  in: query
                  description: Query Paramater
                  schema:
                      type: string
                  example: servebin
            responses:
                "200":
                    description: OK
                    content:
                        "*/*":
                            schema:
                                $ref: "#/components/schemas/response.EmptyResponse"
                "400":
                    description: Bad Request
                    content: {}
                "404":
                    description: Not Found
                    content: {}
                "500":
                    description: Internal Server Error
                    content:
                        "*/*":
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /gzip:
        get:
            tags:
                - Response formats
            summary: Returns GZip-encoded data.
            description: Returns GZip-encoded data.
            responses:
