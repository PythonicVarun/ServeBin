                                format: binary
                        image/avif:
                            schema:
                                format: binary
                        image/x-icon:
                            schema:
                                format: binary
                        image/*:
                            schema:
                                format: binary
                "404":
                    description: Not Found
                "406":
                    description: Not Acceptable
                "500":
                    description: Internal Server Error
