    /head:
        head:
            tags:
                - HTTP Methods
            summary: Returns the request parameters.
            description:
                Returns different type of request parameters like form data, json
                data, raw data, headers etc.
            parameters:
                - name: customheader
                  in: header
                  description: Header
                  schema:
                      type: string
                  example: servebin-demo
            responses:
                "200":
                    description: OK
                    content: {}
                "400":
                    description: Bad Request
                    content: {}
                "404":
                    description: Not Found
                    content: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /headers:
        get:
            tags:
                - Request inspection
            summary: Return the incoming request's HTTP headers.
            description: It returns the incoming request's HTTP headers.
            responses:
                "200":
                    description: OK
                    content:
