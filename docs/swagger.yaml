                "401":
                    description: Unauthorized
    /drip:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Drips bytes over a duration.
            description: Drips data over a duration after an optional initial delay.
            responses:
                "200":
                    description: OK
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
            parameters:
                - name: numbytes
                  in: query
                  description: Number of bytes to drip
                  schema:
                      type: integer
                      default: 10
                  example: 10
                - name: duration
                  in: query
                  description: Duration in seconds
                  schema:
                      type: number
                      default: 2
                  example: 2
                - name: delay
                  in: query
                  description: Initial delay in seconds
                  schema:
                      type: number
                      default: 0
                  example: 0
                - name: code
                  in: query
                  description: HTTP status code to return
                  schema:
                      type: integer
                      default: 200
                  example: 200
    /encoding/utf8:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Returns a UTF-8 sample page.
            description: Returns a page containing UTF-8 data.
            responses:
                "200":
                    description: OK
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /etag/{etag}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Returns an ETag-aware response.
            description: Responds to If-None-Match with 304 and If-Match with 412 when appropriate.
            parameters:
                - name: etag
                  in: path
                  description: ETag value
                  required: true
                  schema:
                      type: string
                  example: servebin-v1
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPBinRequestResponse"
                "304":
                    description: Not Modified
                "412":
                    description: Precondition Failed
