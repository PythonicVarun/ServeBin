            responses:
                "200":
                    description: OK
                    content: {}
                "400":
                    description: Bad Request
                    content: {}
                "404":
                    description: Not Found
                    content: {}
                "500":
                    description: Internal Server Error
                    content:
                        "*/*":
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /patch:
        patch:
            tags:
                - HTTP Methods
            summary: Returns the request parameters.
            description:
