    /image:
        get:
            tags:
                - Images
            summary: Returns image as per the Accept header.
            description: Returns a simple image of the type suggest by the Accept header.
            responses:
                "200":
                    description: OK
                    content:
                        image/png:
                            schema:
                                format: binary
                        image/jpeg:
                            schema:
                                format: binary
                        image/svg+xml:
                            schema:
                                format: binary
                        image/gif:
