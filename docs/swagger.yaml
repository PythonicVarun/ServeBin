    /stream-bytes/{n}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Streams random bytes.
            description: Streams n random bytes of binary data in chunked encoding.
            parameters:
                - name: n
                  in: path
                  description: Number of bytes
                  required: true
                  schema:
                      type: integer
                  example: 16
                - name: chunk_size
                  in: query
                  description: Chunk size in bytes
                  schema:
                      type: integer
                      default: 10
                  example: 4
                - name: seed
                  in: query
                  description: Seed for deterministic bytes
                  schema:
                      type: integer
                      format: int64
                  example: 123
            responses:
                "200":
                    description: OK
                "400":
                    description: Bad Request
                    content:
                        application/json:
