                "406":
                    description: Not Acceptable
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /absolute-redirect/{n}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Performs absolute redirects.
            description: 302 absolute redirects n times.
            parameters:
                - name: n
                  in: path
                  description: Number of redirects
                  required: true
                  schema:
                      type: integer
                  example: 2
            responses:
                "302":
                    description: Found
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /anything:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Returns request data for any method.
            description: Returns request data, including method used.
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPBinRequestResponse"
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /anything/{anything}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Returns request data for any method.
            description: Returns request data, including method used.
            parameters:
                - name: anything
                  in: path
                  description: Anything
                  required: true
                  schema:
                      type: string
                  example: debug-request
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPBinRequestResponse"
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /base64/{value}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Decodes a base64 string.
            description: Decodes base64url-encoded text.
            parameters:
                - name: value
                  in: path
                  description: Base64 value to decode
                  required: true
                  schema:
                      type: string
                  example: U2VydmVCaW4
            responses:
                "200":
                    description: OK
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /basic-auth/{user}/{passwd}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Challenges HTTP basic auth.
            description: Returns authenticated user data when the credentials match.
            parameters:
                - name: user
                  in: path
                  description: Username
                  required: true
                  schema:
                      type: string
                  example: user
                - name: passwd
                  in: path
                  description: Password
                  required: true
                  schema:
                      type: string
                  example: passwd
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.AuthResponse"
                "401":
                    description: Unauthorized
    /bytes/{n}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Generates random bytes.
            description: Generates n random bytes of binary data.
            parameters:
                - name: n
                  in: path
                  description: Number of bytes
                  required: true
                  schema:
                      type: integer
                  example: 16
                - name: seed
                  in: query
                  description: Seed for deterministic bytes
                  schema:
                      type: integer
                      format: int64
                  example: 123
            responses:
                "200":
                    description: OK
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /cache:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Returns a cacheable response.
            description: Returns 304 when If-Modified-Since or If-None-Match is provided.
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPBinRequestResponse"
                "304":
                    description: Not Modified
    /cache/{n}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Sets a Cache-Control header.
            description: Sets Cache-Control for n seconds.
            parameters:
                - name: n
                  in: path
                  description: Cache duration in seconds
                  required: true
                  schema:
                      type: integer
                  example: 60
            responses:
                "200":
