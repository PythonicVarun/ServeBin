            responses:
                "302":
                    description: Found
    /delay/{n}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Delays the response.
            description: Delays responding for min(n, 10) seconds.
            parameters:
                - name: n
                  in: path
                  description: Delay duration in seconds
                  required: true
                  schema:
                      type: integer
                  example: 3
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPBinRequestResponse"
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
    /digest-auth/{qop}/{user}/{passwd}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Challenges HTTP digest auth.
            description: Supports qop=auth with MD5 or SHA-256.
            parameters:
                - name: qop
                  in: path
                  description: Digest quality of protection
                  required: true
                  schema:
                      type: string
                  example: auth
                - name: user
                  in: path
                  description: Username
                  required: true
                  schema:
                      type: string
                  example: user
                - name: passwd
                  in: path
                  description: Password
                  required: true
                  schema:
                      type: string
                  example: passwd
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.AuthResponse"
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
                "401":
                    description: Unauthorized
    /digest-auth/{qop}/{user}/{passwd}/{algorithm}:
        get:
            tags:
                - HTTPBin Compatibility
            summary: Challenges HTTP digest auth.
            description: Supports qop=auth with MD5 or SHA-256.
            parameters:
                - name: qop
                  in: path
                  description: Digest quality of protection
                  required: true
                  schema:
                      type: string
                  example: auth
                - name: user
                  in: path
                  description: Username
                  required: true
                  schema:
                      type: string
                  example: user
                - name: passwd
                  in: path
                  description: Password
                  required: true
                  schema:
                      type: string
                  example: passwd
                - name: algorithm
                  in: path
                  description: Digest algorithm
                  required: true
                  schema:
                      type: string
                  example: MD5
            responses:
