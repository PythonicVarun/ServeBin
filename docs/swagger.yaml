                data, raw data, headers etc.
            parameters:
                - name: customheader
                  in: header
                  description: Header
                  schema:
                      type: string
                  example: servebin-demo
                - name: queryparam
                  in: query
                  description: Query Paramater
                  schema:
                      type: string
                  example: servebin
            requestBody:
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                body:
                                    type: string
                                    description: Body
                                formdata:
                                    type: string
                                    description: Form Data
                                    format: binary
            responses:
                "200":
                    description: OK
                    content:
                        "*/*":
                            schema:
                                $ref: "#/components/schemas/response.BodyDataResponse"
                "400":
                    description: Bad Request
                    content: {}
                "404":
                    description: Not Found
                    content: {}
                "500":
                    description: Internal Server Error
                    content:
                        "*/*":
                            schema:
                                $ref: "#/components/schemas/response.HTTPError"
