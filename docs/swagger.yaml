                - HTTPBin Compatibility
            summary: Returns a page of HTML links.
            description: Returns a page containing n HTML links.
            parameters:
                - name: n
                  in: path
                  description: Total number of links
                  required: true
                  schema:
                      type: integer
                  example: 5
            responses:
